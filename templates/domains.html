<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>域名证书监控 · CertLive 证活</title>
  <link rel="stylesheet" href="/static/lib/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="/static/css/modal.css">
  <link rel="stylesheet" href="/static/css/domains.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <img class="topbar-logo" src="/static/image/logo.svg" alt="logo">
      <span class="topbar-title">CertLive 证活</span>
    </div>
    <div class="topbar-right">
      <a href="/logout" class="topbar-logout" data-modal-open="logoutModal"><i class="fas fa-right-from-bracket"></i>退出</a>
    </div>
  </header>

  <main class="container">
    <!-- 工具栏 -->
    <div class="toolbar">
      <div class="toolbar-left">
        <h2 class="page-title">域名证书监控</h2>
        <span class="count-badge" id="countBadge">--</span>
      </div>
      <div class="toolbar-right">
        <div class="search-box">
          <i class="fas fa-magnifying-glass search-icon"></i>
          <input id="searchInput" type="text" placeholder="搜索域名或说明" autocomplete="off">
        </div>
        <button class="btn btn-primary" id="addBtn" type="button">
          <i class="fas fa-plus"></i>新增域名
        </button>
      </div>
    </div>

    <!-- 列表 -->
    <div class="table-wrap">
      <table class="domains-table">
        <thead>
          <tr>
            <th class="col-host">域名</th>
            <th class="col-cert">证书信息</th>
            <th class="col-expiry">到期时间</th>
            <th class="col-checked">检测时间</th>
            <th class="col-notes">说明</th>
            <th class="col-actions">操作</th>
          </tr>
        </thead>
        <tbody id="domainsBody">
          <tr class="loading-row"><td colspan="6"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
      <div id="emptyState" class="empty-state" hidden>
        <i class="fas fa-folder-open"></i>
        <p>暂无域名数据</p>
        <button class="btn btn-primary" type="button" onclick="document.getElementById('addBtn').click()">
          <i class="fas fa-plus"></i>添加第一个域名
        </button>
      </div>
    </div>

    <!-- 移动端卡片视图（与 table-wrap 互斥） -->
    <div id="cardList" class="card-list" hidden></div>

    <!-- 分页 -->
    <div class="pagination" id="pagination" hidden>
      <button class="page-btn" id="prevPage" type="button"><i class="fas fa-chevron-left"></i></button>
      <span class="page-info" id="pageInfo">1 / 1</span>
      <button class="page-btn" id="nextPage" type="button"><i class="fas fa-chevron-right"></i></button>
      <span class="page-size">每页 <select id="pageSizeSelect"><option>20</option><option>50</option><option>100</option></select> 条</span>
    </div>
  </main>

  <!-- 新增 / 编辑域名弹窗 -->
  <div class="modal-overlay" id="domainModal" aria-hidden="true">
    <div class="modal-card dlg">
      <div class="dlg-head">
        <h3 id="domainModalTitle">新增域名</h3>
        <p id="domainModalSub">添加后可立即检测证书状态</p>
      </div>
      <form id="domainForm" class="dlg-body" autocomplete="off">
        <input type="hidden" id="domainId">

        <div class="field">
          <label for="hostInput">域名</label>
          <div class="field-control">
            <input id="hostInput" type="text" placeholder="example.com" required>
            <p class="field-help">支持直接粘贴浏览器地址，自动去除 https:// 和路径</p>
          </div>
        </div>

        <div class="field">
          <label for="notesInput">说明</label>
          <div class="field-control">
            <textarea id="notesInput" rows="3" maxlength="120" placeholder="可选，备注用途 / 责任人 / 续费信息"></textarea>
            <p class="field-counter" id="notesCounter">0 / 120</p>
          </div>
        </div>

        <div class="dlg-actions">
          <button type="button" class="btn-ghost" data-modal-close>取消</button>
          <button type="submit" class="btn-solid" id="domainSubmitBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="modal-overlay" id="deleteModal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-icon danger"><i class="fas fa-triangle-exclamation"></i></div>
      <h3 class="modal-title">确认删除该域名？</h3>
      <p class="modal-desc">将删除 <b id="deleteHostName">--</b> 及其检测记录，不可恢复</p>
      <div class="modal-actions">
        <button class="modal-btn modal-cancel" type="button" data-modal-close>取消</button>
        <button class="modal-btn modal-confirm" type="button" id="deleteConfirmBtn"><i class="fas fa-trash"></i>确认删除</button>
      </div>
    </div>
  </div>

  <!-- 退出确认弹窗 -->
  <div class="modal-overlay" id="logoutModal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-icon danger"><i class="fas fa-right-from-bracket"></i></div>
      <h3 class="modal-title">确认退出登录？</h3>
      <p class="modal-desc">退出后需重新登录才能进入后台</p>
      <div class="modal-actions">
        <button class="modal-btn modal-cancel" type="button" data-modal-close>取消</button>
        <a href="/logout" class="modal-btn modal-confirm"><i class="fas fa-check"></i>确认退出</a>
      </div>
    </div>
  </div>

  <!-- SAN 列表弹窗 -->
  <div class="modal-overlay" id="sanListModal" aria-hidden="true">
    <div class="modal-card dlg dlg-san">
      <div class="dlg-head">
        <h3 id="sanListTitle">证书覆盖的域名</h3>
        <p id="sanListSub">--</p>
      </div>
      <div class="dlg-body">
        <div class="san-list" id="sanListBody"></div>
      </div>
      <div class="dlg-actions">
        <button type="button" class="btn-solid" data-modal-close>关闭</button>
      </div>
    </div>
  </div>

  <!-- 轻量 toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="/static/js/modal.js"></script>
  <script src="/static/js/domains.js"></script>
</body>
</html>
