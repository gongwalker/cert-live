services:
  cert-live:
    # 默认从 Docker Hub 拉公共镜像(gongwen/cert-live),支持 amd64/arm64 双架构
    # 想本地构建就把下一行注释掉,放开再下面那行
    image: gongwen/cert-live:latest
    # build: .
    container_name: cert-live
    restart: unless-stopped
    # 显式指定公共 DNS,避免云厂内部 DNS 在容器内不响应(腾讯云 183.60.x 常见坑)
    dns:
      - 119.29.29.29
      - 223.5.5.5
    # 日志轮转:单个文件 10MB,最多保留 3 个,满了滚动覆盖(约上限 30MB)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8080:8080"
    volumes:
      # 数据库文件持久化(容器删了数据还在)
      - ./data:/app/data
      # 同步宿主机时区(镜像里也装了 tzdata 兜底)
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      # ⚠️ 生产部署务必改成强随机的 SESSION_SECRET(openssl rand -hex 32)
      - SESSION_SECRET=please-change-me-to-a-long-random-string
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      - GIN_MODE=release
      - DB_PATH=/app/data/certlive.db
      - TZ=Asia/Shanghai
